appId: com.kiip.slonready
---
# Precondition: onboarding done, Feb 2026 transactions imported.
- runFlow: "onboarding_new_user.yaml"

# ── EDIT PATH — open tx-edit, change amount, save ─────────────────────────────
# Tap STARBUCKS to open the edit screen.
- tapOn: "STARBUCKS #12345 SANTA BARBARA CA"

# ── Screen: tx-edit ───────────────────────────────────────────────────────────
- assertVisible: "Edit Transaction"
# Source badge shows "Imported" (source_is_manual = 0).
- assertVisible: "Imported"
# Form fields confirm the screen loaded with transaction data.
- assertVisible: "Amount"
- assertVisible: "Description"

# Edit the amount. The original value "6.75" is 4 chars — eraseText: 100
# reliably clears a short numeric field by backspacing from the cursor position.
- tapOn: "Amount field"
- eraseText: 100
- inputText: "-7.00"

# Save and return to account list.
- tapOn: "Save Changes"

# ── Back on account detail — STARBUCKS row is still present ───────────────────
# (description unchanged — only amount was edited)
- assertVisible: "Chase Freedom"
- assertVisible: "STARBUCKS #12345 SANTA BARBARA CA"

# ── DELETE PATH — soft-drop an imported transaction ───────────────────────────
# ARCO is an imported transaction (source_is_manual = 0) → soft drop on delete.
- tapOn: "ARCO #42448 GOLETA CA"
- assertVisible: "Edit Transaction"
- assertVisible: "Delete Transaction"
- tapOn: "Delete Transaction"

# ── Alert: "Delete transaction?" — confirm ────────────────────────────────────
- assertVisible: "Delete transaction?"
- tapOn: "Delete"

# ── Back on account detail ────────────────────────────────────────────────────
- assertVisible: "Chase Freedom"

# Soft-dropped imported rows remain in the list (dropped_at IS set but row is
# not removed — consistent with the audit-trail convention).
# Re-open to confirm the source badge now shows "Dropped".
- tapOn: "ARCO #42448 GOLETA CA"
- assertVisible: "Edit Transaction"
# Source badge full text is "Imported · Dropped" (one node — Maestro requires exact match).
# Successfully opening this row also proves the soft-drop worked: a hard-deleted row
# would have disappeared from the list entirely.
- assertVisible: "Imported · Dropped"
- tapOn: "Back"
